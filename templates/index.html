<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaSala - Reserva de Salas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🏫 ReservaSala</h1>
            <ul class="nav-links">
                <li><a href="/" class="nav-link active">Reservas</a></li>
                <li><a href="/admin" class="nav-link">Administração</a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-content">
        <h2>Fazer uma Reserva</h2>
        <div class="form-section">
            <form id="formReserva">
                <div class="form-row">
                    <div class="form-group">
                        <label for="sala">Sala *</label>
                        <select id="sala" required>
                            <option value="">Selecione uma sala</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="data">Data *</label>
                        <input type="date" id="data" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="horaInicio">Horário de Início *</label>
                        <select id="horaInicio" required></select>
                    </div>
                    <div class="form-group">
                        <label for="horaFim">Horário de Fim *</label>
                        <select id="horaFim" required></select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="titulo">Título da Reserva *</label>
                    <input type="text" id="titulo" placeholder="Ex: Apresentação de Trabalho" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="responsavel">Responsável *</label>
                        <input type="text" id="responsavel" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" rows="3" placeholder="Detalhes adicionais sobre a reserva"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Reservar Sala</button>
            </form>
        </div>

        <h2>Disponibilidade</h2>
        <div id="disponibilidade" class="availability-section"></div>

        <h2>Reservas Confirmadas</h2>
        <div id="reservas" class="reservas-grid"></div>
    </div>

    <div id="alert" class="alert hidden" role="alert"></div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
