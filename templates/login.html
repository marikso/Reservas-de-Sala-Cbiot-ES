<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - ReservaSala</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🏫 ReservaSala</h1>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Reservas</a></li>
                <li><a href="/admin" class="nav-link active">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-content">
        <h2>Login Administrativo</h2>
        <div class="form-section">
            <form method="post" action="{{ url_for('admin_login') }}">
                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite a senha" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            {% if erro %}
            <div class="alert show error" style="margin-top: 1rem;">{{ erro }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
